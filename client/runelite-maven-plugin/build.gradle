plugins {
    id 'buildlogic.java-conventions'
    id 'java'
}

description = 'RuneLite Maven Plugin'

dependencies {
    api project(':cache')
    api libs.org.apache.maven.maven.plugin.api
    api libs.org.apache.maven.plugin.tools.maven.plugin.annotations
    api libs.org.apache.maven.maven.core
    api libs.org.tomlj.tomlj
    api libs.com.squareup.javapoet
}
