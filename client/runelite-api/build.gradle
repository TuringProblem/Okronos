 *
 * This project uses @Incubating APIs which are subject to change.
 */

plugins {
    id 'buildlogic.java-conventions'
}

dependencies {
    api libs.org.slf4j.slf4j.api
    testImplementation libs.junit.junit
    testImplementation libs.org.slf4j.slf4j.simple
    compileOnly libs.org.projectlombok.lombok
    annotationProcessor libs.org.projectlombok.lombok
    testCompileOnly libs.org.projectlombok.lombok
    testAnnotationProcessor libs.org.projectlombok.lombok
    compileOnly libs.com.google.code.findbugs.jsr305
    compileOnly libs.org.jetbrains.annotations
//		api "net.runelite.rs:api:1.3.5"
}

description = 'RuneLite API'

java {
		sourceCompatibility = JavaVersion.VERSION_11
		targetCompatibility = JavaVersion.VERSION_11
		withJavadocJar()
}

sourceSets {
	main {
		java.srcDirs += "${project.buildDir}/generated-sources"
	}
}

compileJava {
	dependsOn("generateComponents")
}
task generateComponents(type: JavaExec) {
	inputs.files("src/main/interfaces")
	outputs.dir("${project.buildDir}/generated-sources")
  project(":runelite-maven-plugin").afterEvaluate {
		classpath = it.sourceSets.main.runtimeClasspath
	}
  mainClass = "net.runelite.mvn.ComponentMojoMain"
  args "src/main/interfaces", "${project.buildDir}/generated-sources"
}
tasks.javadoc {
    enabled = false
}
