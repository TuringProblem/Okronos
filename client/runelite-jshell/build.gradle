plugins {
    id 'buildlogic.java-conventions'
}

dependencies {
    api libs.org.slf4j.slf4j.api
    api libs.com.google.inject.guice
    api libs.com.google.code.findbugs.jsr305
    api libs.com.fifesoft.rsyntaxtextarea
    api libs.com.fifesoft.autocomplete
    api libs.net.runelite.flatlaf.extras
    compileOnly libs.org.projectlombok.lombok
    annotationProcessor libs.org.projectlombok.lombok
}

description = 'RuneLite JShell'

java {
		withJavadocJar()
		sourceCompatibility = JavaVersion.VERSION_11
		targetCompatibility = JavaVersion.VERSION_11
}
